[tools]
dotnet = "10.0"

[tasks.restore]
run = "dotnet restore"

[tasks.tool-restore]
run = "dotnet tool restore"

[tasks.build]
run = "dotnet build"
depends = ["restore"]

[tasks.test]
run = """
for proj in $(find tests -name '*.Tests.fsproj' | sort); do
  project_name=$(basename "$(dirname "$proj")" | sed 's/\\.Tests$//')
  echo "Testing $proj (coverage -> coverage/$project_name/)"
  dotnet test --project "$proj" \
    --coverage \
    --coverage-output-format cobertura \
    --coverage-output "$PWD/coverage/$project_name/coverage.cobertura.xml"
done
"""
depends = ["build"]

[tasks.coverage-check]
run = """
for config in coverage-ratchet-*.json; do
  [ -f "$config" ] || continue
  project=$(echo "$config" | sed 's/coverage-ratchet-\\(.*\\)\\.json/\\1/')
  echo "Checking $project..."
  (cd "coverage/$project" && dotnet run --project "../../src/CoverageRatchet/CoverageRatchet.fsproj" --no-build -- check "../../$config")
done
"""
depends = ["test"]

[tasks.coverage-ratchet]
run = """
for config in coverage-ratchet-*.json; do
  [ -f "$config" ] || continue
  project=$(echo "$config" | sed 's/coverage-ratchet-\\(.*\\)\\.json/\\1/')
  echo "Ratcheting $project..."
  (cd "coverage/$project" && dotnet run --project "../../src/CoverageRatchet/CoverageRatchet.fsproj" --no-build -- ratchet "../../$config")
done
"""
depends = ["test"]

[tasks.coverage-loosen]
run = """
for config in coverage-ratchet-*.json; do
  [ -f "$config" ] || continue
  project=$(echo "$config" | sed 's/coverage-ratchet-\\(.*\\)\\.json/\\1/')
  echo "Loosening $project..."
  (cd "coverage/$project" && dotnet run --project "../../src/CoverageRatchet/CoverageRatchet.fsproj" --no-build -- loosen "../../$config")
done
"""
depends = ["test"]

[tasks.loosen-from-ci]
run = """
for config in coverage-ratchet-*.json; do
  [ -f "$config" ] || continue
  project=$(echo "$config" | sed 's/coverage-ratchet-\\(.*\\)\\.json/\\1/')
  echo "Loosening from CI $project..."
  (cd "coverage/$project" && dotnet run --project "../../src/CoverageRatchet/CoverageRatchet.fsproj" --no-build -- loosen-from-ci "../../$config")
done
"""
depends = ["test"]

[tasks.format]
run = "dotnet fantomas src/ tests/"
depends = ["tool-restore"]

[tasks.format-check]
run = "dotnet fantomas src/ tests/ --check"
depends = ["tool-restore"]

[tasks.lint]
run = "dotnet fsharplint lint FSharpOssTooling.slnx"
depends = ["build", "tool-restore"]

[tasks.check-gitignore]
description = "Check for gitignored files tracked in jj history"
run = "dotnet fsi scripts/check-gitignore-leaks.fsx"

[tasks.check-docs-index]
description = "Verify all packable projects are linked in docs/docs-index.html"
run = "dotnet fsi scripts/check-docs-index.fsx"

[tasks.sync-docs]
run = "dotnet run --project src/SyncDocs/SyncDocs.fsproj --no-build -- sync"
depends = ["build"]

[tasks.sync-docs-check]
run = "dotnet run --project src/SyncDocs/SyncDocs.fsproj --no-build -- check"
depends = ["build"]

[tasks.check]
depends = ["format", "lint", "lint-project", "sync-docs", "docs", "coverage-ratchet", "check-docs-index"]

[tasks.ci]
depends = ["format-check", "lint", "lint-project", "sync-docs-check", "docs", "coverage-check", "check-docs-index"]

[tasks.pack]
run = """
dotnet pack src/CoverageRatchet/CoverageRatchet.fsproj -c Release -o artifacts/
dotnet pack src/SyncDocs/SyncDocs.fsproj -c Release -o artifacts/
dotnet pack src/FsSemanticTagger/FsSemanticTagger.fsproj -c Release -o artifacts/
dotnet pack src/FsProjLint/FsProjLint.fsproj -c Release -o artifacts/
"""
depends = ["build"]

[tasks.lint-project]
run = "dotnet run --project src/FsProjLint/FsProjLint.fsproj --no-build"
depends = ["build"]

[tasks.release]
run = "dotnet run --project src/FsSemanticTagger/FsSemanticTagger.fsproj --no-build -- release"
depends = ["build"]

[tasks.release-alpha]
run = "dotnet run --project src/FsSemanticTagger/FsSemanticTagger.fsproj --no-build -- alpha"
depends = ["build"]

[tasks.docs]
run = "dotnet fsdocs build --output output/docs --clean"
depends = ["build", "tool-restore"]

[tasks.docs-watch]
run = "dotnet fsdocs watch"
depends = ["build", "tool-restore"]
