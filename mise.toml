[tools]
dotnet = "10.0"

[tasks.restore]
run = "dotnet restore"

[tasks.tool-restore]
run = "dotnet tool restore"

[tasks.build]
run = "dotnet build"
depends = ["restore"]

[tasks.test]
run = """
dotnet test --project tests/CoverageRatchet.Tests --coverage --coverage-output-format cobertura --coverage-output $PWD/coverage/CoverageRatchet/coverage.cobertura.xml
dotnet test --project tests/FsSemanticTagger.Tests --coverage --coverage-output-format cobertura --coverage-output $PWD/coverage/FsSemanticTagger/coverage.cobertura.xml
dotnet test --project tests/SyncDocs.Tests --coverage --coverage-output-format cobertura --coverage-output $PWD/coverage/SyncDocs/coverage.cobertura.xml
"""
depends = ["build"]

[tasks.coverage-check]
run = """
(cd coverage/CoverageRatchet && dotnet run --project ../../src/CoverageRatchet -- check --config ../../coverage-ratchet-CoverageRatchet.json)
(cd coverage/FsSemanticTagger && dotnet run --project ../../src/CoverageRatchet -- check --config ../../coverage-ratchet-FsSemanticTagger.json)
(cd coverage/SyncDocs && dotnet run --project ../../src/CoverageRatchet -- check --config ../../coverage-ratchet-SyncDocs.json)
"""
depends = ["test"]

[tasks.coverage-ratchet]
run = """
(cd coverage/CoverageRatchet && dotnet run --project ../../src/CoverageRatchet -- ratchet --config ../../coverage-ratchet-CoverageRatchet.json)
(cd coverage/FsSemanticTagger && dotnet run --project ../../src/CoverageRatchet -- ratchet --config ../../coverage-ratchet-FsSemanticTagger.json)
(cd coverage/SyncDocs && dotnet run --project ../../src/CoverageRatchet -- ratchet --config ../../coverage-ratchet-SyncDocs.json)
"""
depends = ["test"]

[tasks.format]
run = "dotnet fantomas src/ tests/"
depends = ["tool-restore"]

[tasks.format-check]
run = "dotnet fantomas src/ tests/ --check"
depends = ["tool-restore"]

[tasks.lint]
run = "dotnet fsharplint lint FSharpOssTooling.slnx"
depends = ["build", "tool-restore"]

[tasks.check]
depends = ["format", "lint", "docs"]

[tasks.ci]
depends = ["format-check", "lint", "docs", "coverage-check"]

[tasks.pack]
run = """
dotnet pack src/CoverageRatchet/CoverageRatchet.fsproj -c Release -o artifacts/
dotnet pack src/SyncDocs/SyncDocs.fsproj -c Release -o artifacts/
dotnet pack src/FsSemanticTagger/FsSemanticTagger.fsproj -c Release -o artifacts/
"""
depends = ["build"]

[tasks.docs]
run = "dotnet fsdocs build --output output/docs --clean"
depends = ["build", "tool-restore"]

[tasks.docs-watch]
run = "dotnet fsdocs watch"
depends = ["build", "tool-restore"]
