name: Release
on:
  push:
    tags:
      - 'coverageratchet-v*'
      - 'syncdocs-v*'
      - 'fssemantictagger-v*'
      - 'fsprojlint-v*'

permissions:
  contents: write
  id-token: write

jobs:
  release-coverageratchet:
    if: startsWith(github.ref, 'refs/tags/coverageratchet-v')
    uses: ./.github/workflows/michaels-wacky-release.yml
    with:
      package-name: CoverageRatchet
      tag-prefix: coverageratchet-v
      fsproj-path: src/CoverageRatchet/CoverageRatchet.fsproj
    permissions:
      contents: write

  # NuGet Trusted Publishing requires nuget/login to run in the calling repo's
  # workflow, not a reusable workflow from another repo. The OIDC token's
  # job_workflow_ref must match the repo's own workflow file.
  publish-coverageratchet:
    if: startsWith(github.ref, 'refs/tags/coverageratchet-v')
    needs: release-coverageratchet
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts
      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  release-syncdocs:
    if: startsWith(github.ref, 'refs/tags/syncdocs-v')
    uses: ./.github/workflows/michaels-wacky-release.yml
    with:
      package-name: SyncDocs
      tag-prefix: syncdocs-v
      fsproj-path: src/SyncDocs/SyncDocs.fsproj
    permissions:
      contents: write

  publish-syncdocs:
    if: startsWith(github.ref, 'refs/tags/syncdocs-v')
    needs: release-syncdocs
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts
      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  release-fssemantictagger:
    if: startsWith(github.ref, 'refs/tags/fssemantictagger-v')
    uses: ./.github/workflows/michaels-wacky-release.yml
    with:
      package-name: FsSemanticTagger
      tag-prefix: fssemantictagger-v
      fsproj-path: src/FsSemanticTagger/FsSemanticTagger.fsproj
    permissions:
      contents: write

  publish-fssemantictagger:
    if: startsWith(github.ref, 'refs/tags/fssemantictagger-v')
    needs: release-fssemantictagger
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts
      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  release-fsprojlint:
    if: startsWith(github.ref, 'refs/tags/fsprojlint-v')
    uses: ./.github/workflows/michaels-wacky-release.yml
    with:
      package-name: FsProjLint
      tag-prefix: fsprojlint-v
      fsproj-path: src/FsProjLint/FsProjLint.fsproj
    permissions:
      contents: write

  publish-fsprojlint:
    if: startsWith(github.ref, 'refs/tags/fsprojlint-v')
    needs: release-fsprojlint
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts
      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
