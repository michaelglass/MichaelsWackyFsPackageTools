name: Bootstrap Release (one-time)
on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - CoverageRatchet
          - SyncDocs
          - FsSemanticTagger
      version:
        description: 'Version (e.g. 0.1.0-alpha.1)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - name: Set version and pack
        run: |
          FSPROJ="src/${{ inputs.package }}/${{ inputs.package }}.fsproj"
          sed -i "s|<Version>[^<]*</Version>|<Version>${{ inputs.version }}</Version>|" "$FSPROJ"
          dotnet pack "$FSPROJ" -c Release -o ./artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.package == 'CoverageRatchet' && 'coverageratchet-v' || inputs.package == 'SyncDocs' && 'syncdocs-v' || 'fssemantictagger-v' }}${{ inputs.version }}
          name: ${{ inputs.package }} v${{ inputs.version }} (bootstrap)
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
