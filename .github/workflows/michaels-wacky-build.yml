name: Build
on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        default: '10.0.x'
      solution:
        type: string
        required: true
      fantomas-paths:
        type: string
        default: 'src/ tests/'
      has-examples:
        type: boolean
        default: false
      example-path:
        type: string
        default: 'examples/'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - run: dotnet restore
      - run: dotnet tool restore
      - name: Format check
        run: dotnet fantomas ${{ inputs.fantomas-paths }} --check
      - name: Sync docs check
        run: dotnet run --project src/SyncDocs/SyncDocs.fsproj -- check
      - name: Build
        run: dotnet build --warnaserror --no-restore
      - name: Lint
        run: dotnet fsharplint lint ${{ inputs.solution }}
      - name: Generate docs
        run: dotnet fsdocs build --output output/docs --clean
      - name: Test with coverage
        run: |
          for proj in $(find tests -name '*.Tests.fsproj' | sort); do
            project_name=$(basename "$(dirname "$proj")" | sed 's/\.Tests$//')
            echo "Testing $proj (coverage -> coverage/$project_name/)"
            dotnet test --project "$proj" \
              --coverage \
              --coverage-output-format cobertura \
              --coverage-output "${{ github.workspace }}/coverage/$project_name/coverage.cobertura.xml"
          done
      - name: Coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: coverage/*/coverage.cobertura.xml
          targetdir: coverage/report
          reporttypes: 'HtmlInline;MarkdownSummaryGithub'
      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/*/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: '50 70'
      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md
      - name: Coverage ratchet check
        run: |
          for config in coverage-ratchet-*.json; do
            [ -f "$config" ] || continue
            project=$(echo "$config" | sed 's/coverage-ratchet-\(.*\)\.json/\1/')
            echo "Checking $project..."
            (cd "coverage/$project" && dotnet run --project "../../src/CoverageRatchet/CoverageRatchet.fsproj" -- check --config "../../$config")
          done
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report
      - name: Build examples
        if: inputs.has-examples
        run: dotnet build ${{ inputs.example-path }} --warnaserror
