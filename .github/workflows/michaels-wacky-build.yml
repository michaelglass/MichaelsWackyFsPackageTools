name: Build
on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        default: '10.0.x'
      solution:
        type: string
        required: true
      fantomas-paths:
        type: string
        default: 'src/ tests/'
      example-projects:
        description: 'Space-separated paths to example .fsproj/.csproj files to build. Leave empty to auto-discover from examples/ directory, or set to "none" to skip.'
        type: string
        default: ''
      check-docs:
        type: boolean
        default: true
      syncdocs-cmd:
        type: string
        default: 'dotnet tool run syncdocs'
      coverageratchet-cmd:
        type: string
        default: 'dotnet tool run coverageratchet'
      coverage-exclude:
        description: >-
          Space/newline-separated project names (the coverage-dir name, i.e. the
          test folder minus the ".Tests" suffix — e.g. "RefStamp") whose tests
          RUN but are NOT coverage-collected. For packages that ship no
          instrumentable product code (an MSBuild-targets-only package whose
          tests drive a `dotnet pack` subprocess): they would otherwise emit an
          empty cobertura, which the Coverage summary step rejects as a failure
          by design. Leave empty to collect coverage for every test project.
        type: string
        default: ''
      paket-restore:
        description: 'Run paket restore after tool restore (for projects using Paket git dependencies)'
        type: boolean
        default: false
      pre-build-cmd:
        description: 'Command to run after restore/tool-restore but before build (e.g. code generation)'
        type: string
        default: ''
      test-extra-args:
        description: 'Extra arguments appended to dotnet test (e.g. --ignore-exit-code 7)'
        type: string
        default: ''
      lint-cmd:
        description: 'Command to run for the Lint step. Empty string uses the default `dotnet fsharplint lint <solution>`. Override to e.g. `dotnet run --project src/MyCli -- analyze --run-once` when hosting analyzers in-process.'
        type: string
        default: ''
      failure-artifacts:
        description: >-
          Newline-separated glob(s) uploaded as a CI artifact when the job FAILS,
          for post-mortem. Defaults to the fshw daemon''s per-test verdict logs +
          run logs — the console collapses a daemon test failure to `failed: N`
          and discards the per-test detail, so without this a CI red names no
          test. Missing paths are ignored (a repo that produces no `.fshw/` just
          uploads nothing). Set to "none" to disable; override to add custom paths.
        type: string
        default: |
          .fshw/test-runs/**
          .fshw/**/*.log

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.fsproj', '**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet tool restore
      - name: Paket restore
        if: inputs.paket-restore
        run: dotnet tool run paket restore
      - run: dotnet restore
      - name: Pre-build
        if: inputs.pre-build-cmd != ''
        run: ${{ inputs.pre-build-cmd }}
      - name: Format check
        run: dotnet fantomas ${{ inputs.fantomas-paths }} --check
      - name: Sync docs check
        run: ${{ inputs.syncdocs-cmd }} check
      - name: Build
        run: dotnet build --warnaserror --no-restore
      - name: Lint
        timeout-minutes: 15
        run: ${{ inputs.lint-cmd != '' && inputs.lint-cmd || format('dotnet fsharplint lint {0}', inputs.solution) }}
      - name: Generate docs
        if: inputs.check-docs
        run: dotnet fsdocs build --output output/docs --clean
      - name: Test with coverage
        id: test-coverage
        run: |
          # Space-separated set of project names to run WITHOUT coverage
          # collection (see the coverage-exclude input). Word-splitting is
          # intentional: names have no spaces.
          exclude="${{ inputs.coverage-exclude }}"
          for proj in $(find tests -name '*.Tests.fsproj' | sort); do
            project_name=$(basename "$(dirname "$proj")" | sed 's/\.Tests$//')
            # --no-build/--no-restore: the Build step above already compiled the
            # whole solution (test projects included). Without these flags each
            # `dotnet test` re-runs restore + an MSBuild up-to-date evaluation
            # over the test project's full ProjectReference graph (and an
            # incremental recompile whenever that up-to-date check misses).
            # Skipping that redundant pass saves ~1s+ per test project on a warm
            # tree, scaling with graph size. Coverage is a runtime collector, so
            # skipping the build does not affect it (verified: cobertura still
            # emitted with --no-build).
            skip=0
            for ex in $exclude; do
              [ "$ex" = "$project_name" ] && skip=1
            done
            if [ "$skip" = 1 ]; then
              echo "Testing $proj (coverage SKIPPED — '$project_name' in coverage-exclude)"
              dotnet test --project "$proj" \
                --no-build \
                --no-restore \
                ${{ inputs.test-extra-args }}
              continue
            fi
            echo "Testing $proj (coverage -> coverage/$project_name/)"
            dotnet test --project "$proj" \
              --no-build \
              --no-restore \
              --coverage \
              --coverage-output-format cobertura \
              --coverage-output "${{ github.workspace }}/coverage/$project_name/coverage.cobertura.xml" \
              ${{ inputs.test-extra-args }}
          done
      - name: Coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: coverage/*/coverage.cobertura.xml
          targetdir: coverage/report
          reporttypes: 'HtmlInline;MarkdownSummaryGithub'
      - name: Coverage summary
        id: coverage-summary
        run: |
          # Inlined replacement for irongut/CodeCoverageSummary@v1.3.0 — an
          # unmaintained third-party Docker action that hard-threw ("Sequence
          # contains no elements") on an empty coverage document. Aggregates the
          # per-package cobertura files into a markdown summary + shields badge
          # for the PR comment, and — by design — FAILS when a package emits an
          # EMPTY coverage document (no <class> elements / lines-valid=0): for a
          # code package that means the tests instrumented no product code, a
          # real defect worth failing on. A package that legitimately ships no
          # instrumentable code (e.g. an MSBuild-targets package whose tests
          # drive a `dotnet pack` subprocess) is excluded from collection
          # upstream via the coverage-exclude input, so it never produces a file
          # that reaches here.
          shopt -s nullglob
          files=(coverage/*/coverage.cobertura.xml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No coverage files found; nothing to summarize."
            echo "No coverage files were produced." > code-coverage-results.md
            exit 0
          fi

          total_covered=0
          total_valid=0
          empty_found=0
          rows=""

          for f in "${files[@]}"; do
            pkg=$(basename "$(dirname "$f")")
            # Portable extraction (grep -oE works on both GNU and BSD grep; -P
            # would be GNU-only). The cobertura root element carries the
            # aggregate attributes.
            classes=$(grep -c '<class ' "$f" || true)
            covered=$(grep -oE 'lines-covered="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || true)
            valid=$(grep -oE 'lines-valid="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || true)
            covered=${covered:-0}
            valid=${valid:-0}
            if [ "${classes:-0}" -eq 0 ] || [ "$valid" -eq 0 ]; then
              echo "::error file=$f::Empty coverage for '$pkg': tests instrumented no product code. If this package legitimately ships no instrumentable code, add '$pkg' to coverage-exclude in the caller workflow."
              empty_found=1
              rows="${rows}| **${pkg}** | :warning: empty | 0 |"$'\n'
              continue
            fi
            rate=$(awk "BEGIN { printf \"%.1f\", (100*$covered/$valid) }")
            rows="${rows}| ${pkg} | ${rate}% | ${covered}/${valid} |"$'\n'
            total_covered=$((total_covered + covered))
            total_valid=$((total_valid + valid))
          done

          if [ "$total_valid" -gt 0 ]; then
            overall=$(awk "BEGIN { printf \"%.1f\", (100*$total_covered/$total_valid) }")
          else
            overall="0.0"
          fi
          if awk "BEGIN { exit !($overall >= 70) }"; then color=brightgreen
          elif awk "BEGIN { exit !($overall >= 50) }"; then color=yellow
          else color=red
          fi

          {
            echo "![Coverage](https://img.shields.io/badge/coverage-${overall}%25-${color})"
            echo ""
            echo "| Package | Line rate | Lines |"
            echo "|---|---:|---:|"
            printf '%s' "$rows"
            echo ""
            echo "**Overall:** ${overall}% (${total_covered}/${total_valid} lines)"
          } > code-coverage-results.md

          cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

          if [ "$empty_found" -eq 1 ]; then
            echo "Coverage summary failed: empty coverage document(s) found (see errors above)."
            exit 1
          fi
      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md
      - name: Coverage ratchet check
        run: |
          for config in coverage-ratchet-*.json; do
            [ -f "$config" ] || continue
            project=$(echo "$config" | sed 's/coverage-ratchet-\(.*\)\.json/\1/')
            echo "Checking $project..."
            (cd "coverage/$project" && ${{ inputs.coverageratchet-cmd }} check "${{ github.workspace }}/$config")
          done
      - name: Coverage thresholds artifact
        if: always() && steps.test-coverage.outcome == 'success'
        run: |
          for config in coverage-ratchet-*.json; do
            [ -f "$config" ] || continue
            project=$(echo "$config" | sed 's/coverage-ratchet-\(.*\)\.json/\1/')
            echo "Generating thresholds for $project..."
            # check-json writes JSON to the output path (2nd positional arg); exit code
            # is non-zero when any file fails coverage, which is exactly when we need
            # the artifact for loosen-from-ci — so ignore the exit code.
            (cd "coverage/$project" && ${{ inputs.coverageratchet-cmd }} check-json "${{ github.workspace }}/$config" "${{ github.workspace }}/coverage-thresholds-${project}.json") || true
            if [ ! -s "coverage-thresholds-${project}.json" ]; then
              echo "::warning::check-json produced no output for $project; skipping artifact entry"
              rm -f "coverage-thresholds-${project}.json"
            fi
          done
      - name: Upload coverage thresholds
        if: always() && steps.test-coverage.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-thresholds
          path: coverage-thresholds-*.json
          if-no-files-found: ignore
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/report
      - name: Upload failure diagnostics
        # Runs whenever ANY prior step failed (job-level status), so a daemon
        # `check`/test failure in the Lint step — which writes per-test verdicts
        # to .fshw/test-runs and logs to .fshw — is captured for post-mortem even
        # though the console only shows `failed: N`. if-no-files-found: ignore so
        # a repo with no .fshw/ output (or failure-artifacts: none) is a no-op.
        if: failure() && inputs.failure-artifacts != 'none'
        uses: actions/upload-artifact@v7
        with:
          name: failure-diagnostics
          path: ${{ inputs.failure-artifacts }}
          if-no-files-found: ignore
          retention-days: 14
      - name: Build examples
        run: |
          if [ "${{ inputs.example-projects }}" = "none" ]; then
            echo "Skipping examples (explicitly disabled)"
            exit 0
          fi

          if [ -n "${{ inputs.example-projects }}" ]; then
            projects="${{ inputs.example-projects }}"
          else
            projects=$(find examples -name '*.fsproj' -o -name '*.csproj' 2>/dev/null | sort)
          fi

          if [ -z "$projects" ]; then
            echo "No example projects found"
            exit 0
          fi

          # Word-splitting is intentional: project paths are F# .fsproj/.csproj paths without spaces
          for proj in $projects; do
            echo "Building example: $proj"
            dotnet build "$proj" --warnaserror
          done
