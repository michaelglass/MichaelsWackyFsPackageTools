name: Release
on:
  workflow_call:
    inputs:
      package-name:
        type: string
        required: true
      tag-prefix:
        type: string
        default: 'v'
      fsproj-path:
        type: string
        required: true
      extra-fsproj-paths:
        type: string
        default: ''
      paket-restore:
        description: 'Run paket restore after tool restore (for projects using Paket git dependencies)'
        type: boolean
        default: false
    outputs:
      version:
        description: 'The version extracted from the git tag'
        value: ${{ jobs.release.outputs.version }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check CI on the tagged commit; if none found, fall back to parent
          # (jj/fssemantictagger creates an empty version-bump commit for the tag)
          check_ci() {
            local sha=$1
            echo "Checking CI status for commit $sha..." >&2
            gh api "repos/${{ github.repository }}/commits/$sha/check-runs" \
              --jq '[.check_runs[] | select(.name == "build / build")]'
          }
          ci_runs=$(check_ci "${{ github.sha }}")
          total=$(echo "$ci_runs" | jq 'length')
          if [ "$total" -eq "0" ]; then
            parent=$(git rev-parse "${{ github.sha }}^" 2>/dev/null || true)
            if [ -n "$parent" ]; then
              echo "No CI on tagged commit, checking parent $parent..." >&2
              ci_runs=$(check_ci "$parent")
              total=$(echo "$ci_runs" | jq 'length')
            fi
          fi
          if [ "$total" -eq "0" ]; then
            echo "::error::No CI checks found for this commit or its parent. Push to main first."
            exit 1
          fi
          passed=$(echo "$ci_runs" | jq '[.[] | select(.conclusion == "success" or .conclusion == "skipped")] | length')
          if [ "$passed" -eq "0" ]; then
            echo "::error::No passing CI checks found for this commit."
            exit 1
          fi
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.fsproj', '**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet tool restore
      - name: Paket restore
        if: inputs.paket-restore
        run: dotnet tool run paket restore
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - name: Pack main package
        run: dotnet pack ${{ inputs.fsproj-path }} -c Release --no-build -o ./artifacts
      - name: Pack extra packages
        if: inputs.extra-fsproj-paths != ''
        run: |
          IFS=',' read -ra PATHS <<< "${{ inputs.extra-fsproj-paths }}"
          for path in "${PATHS[@]}"; do
            dotnet pack "$path" -c Release --no-build -o ./artifacts
          done
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/${{ inputs.tag-prefix }}}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.package-name }} v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
