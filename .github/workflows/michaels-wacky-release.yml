name: Release
on:
  workflow_call:
    inputs:
      package-name:
        type: string
        required: true
      tag-prefix:
        type: string
        default: 'v'
      fsproj-path:
        type: string
        required: true
      extra-fsproj-paths:
        type: string
        default: ''
    outputs:
      version:
        description: 'The version extracted from the git tag'
        value: ${{ jobs.release.outputs.version }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking CI status for commit ${{ github.sha }}..."
          # Only check CI build runs, not Release/Deploy Docs (tag-triggered, would create circular deps)
          ci_runs=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq '[.check_runs[] | select(.name == "build / build")]')
          total=$(echo "$ci_runs" | jq 'length')
          if [ "$total" -eq "0" ]; then
            echo "::error::No CI checks found for this commit. Push to main first."
            exit 1
          fi
          passed=$(echo "$ci_runs" | jq '[.[] | select(.conclusion == "success" or .conclusion == "skipped")] | length')
          if [ "$passed" -eq "0" ]; then
            echo "::error::No passing CI checks found for this commit."
            exit 1
          fi
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.fsproj', '**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - name: Pack main package
        run: dotnet pack ${{ inputs.fsproj-path }} -c Release --no-build -o ./artifacts
      - name: Pack extra packages
        if: inputs.extra-fsproj-paths != ''
        run: |
          IFS=',' read -ra PATHS <<< "${{ inputs.extra-fsproj-paths }}"
          for path in "${PATHS[@]}"; do
            dotnet pack "$path" -c Release --no-build -o ./artifacts
          done
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/${{ inputs.tag-prefix }}}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.package-name }} v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
