name: Deploy Docs
on:
  workflow_call:
    inputs:
      fsdocs-parameters:
        type: string
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore && dotnet tool restore
      - name: Build docs
        run: dotnet fsdocs build --output output/docs --clean ${{ inputs.fsdocs-parameters }}
      - name: Generate root index
        run: "[ -f docs/docs-index.html ] && cp docs/docs-index.html output/docs/index.html || true"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
