name: Release
on:
  workflow_call:
    inputs:
      package-name:
        type: string
        required: true
      tag-prefix:
        type: string
        default: 'v'
      fsproj-path:
        type: string
        required: true
      extra-fsproj-paths:
        type: string
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - name: Pack main package
        run: dotnet pack ${{ inputs.fsproj-path }} -c Release --no-build -o ./artifacts
      - name: Pack extra packages
        if: inputs.extra-fsproj-paths != ''
        run: |
          IFS=',' read -ra PATHS <<< "${{ inputs.extra-fsproj-paths }}"
          for path in "${PATHS[@]}"; do
            dotnet pack "$path" -c Release --no-build -o ./artifacts
          done
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/${{ inputs.tag-prefix }}}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.package-name }} v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
