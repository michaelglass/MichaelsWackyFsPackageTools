name: Lint Project
on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        default: '10.0.x'

permissions:
  contents: read

jobs:
  lint-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - run: dotnet tool restore
      - name: Lint project
        run: dotnet tool run fsprojlint
